<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><style>body{margin:0;background:#0f1117}</style></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/><stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="audGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f7cac"/><stop offset="100%" stop-color="#2d5a87"/>
    </linearGradient>
    <linearGradient id="goalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9a6f"/><stop offset="100%" stop-color="#2e6b42"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5a9a6f"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f7cac"/>
    </marker>
    <marker id="aW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="70" x2="900" y2="70"/><line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/><line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="0" y1="350" x2="900" y2="350"/><line x1="0" y1="420" x2="900" y2="420"/>
    <line x1="0" y1="490" x2="900" y2="490"/>
    <line x1="112" y1="0" x2="112" y2="560"/><line x1="225" y1="0" x2="225" y2="560"/>
    <line x1="337" y1="0" x2="337" y2="560"/><line x1="450" y1="0" x2="450" y2="560"/>
    <line x1="562" y1="0" x2="562" y2="560"/><line x1="675" y1="0" x2="675" y2="560"/>
    <line x1="787" y1="0" x2="787" y2="560"/>
  </g>
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="18" font-weight="700" fill="#fff" letter-spacing="3">DATA VISUALIZATION FRAMEWORK</text>
  <line x1="180" y1="52" x2="720" y2="52" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
  <!-- LEFT PANEL: GOALS -->
  <rect x="60" y="120" width="210" height="315" rx="12" fill="#162a20" stroke="#3d7a52" stroke-width="1.5"/>
  <rect x="60" y="120" width="210" height="48" rx="12" fill="#2e6b42"/>
  <rect x="60" y="148" width="210" height="20" fill="#2e6b42"/>
  <text x="165" y="150" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="13" font-weight="800" fill="#a8e6c0" letter-spacing="3">GOALS</text>
  <line x1="80" y1="168" x2="250" y2="168" stroke="#5a9a6f" stroke-width="0.8" opacity="0.5"/>
  <text x="80" y="196" font-family="Helvetica,Arial,sans-serif" font-size="9" font-weight="600"
    fill="#5a9a6f" letter-spacing="2">PURPOSE</text>
  <rect x="78" y="205" width="174" height="48" rx="7" fill="#2e6b42" opacity="0.8"/>
  <rect x="78" y="205" width="4" height="48" rx="2" fill="#68c98a"/>
  <text x="96" y="224" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#a8e6c0">inform</text>
  <text x="96" y="243" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#68c98a">communicate facts and data clearly</text>
  <rect x="78" y="261" width="174" height="48" rx="7" fill="rgba(46,107,66,0.3)"/>
  <rect x="78" y="261" width="4" height="48" rx="2" fill="#3d7a52"/>
  <text x="96" y="280" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#c8e6d4">impact / convince</text>
  <text x="96" y="299" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#68c98a">drive decisions and persuade</text>
  <rect x="78" y="317" width="174" height="48" rx="7" fill="#2e6b42" opacity="0.8"/>
  <rect x="78" y="317" width="4" height="48" rx="2" fill="#68c98a"/>
  <text x="96" y="336" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#a8e6c0">explore / communicate</text>
  <text x="96" y="355" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#68c98a">discover patterns and share insights</text>
  <rect x="88" y="374" width="154" height="44" rx="8" fill="rgba(46,107,66,0.15)"
    stroke="#3d7a52" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="165" y="391" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="8" fill="#5a9a6f" letter-spacing="1">CHOOSE ONE OR COMBINE</text>
  <text x="165" y="409" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="8" fill="#5a9a6f" opacity="0.7">to guide chart type and tone</text>
  <!-- ARROWS -->
  <line x1="390" y1="270" x2="274" y2="338" stroke="#5a9a6f" stroke-width="1.5"
    stroke-dasharray="6,4" opacity="0.7" marker-end="url(#aG)"/>
  <line x1="510" y1="242" x2="628" y2="213" stroke="#4f7cac" stroke-width="1.5"
    stroke-dasharray="6,4" opacity="0.7" marker-end="url(#aB)"/>
  <line x1="450" y1="316" x2="450" y2="376" stroke="#fff" stroke-width="1.5"
    opacity="0.4" marker-end="url(#aW)"/>
  <!-- CENTER: AUDIENCE -->
  <rect x="370" y="200" width="160" height="112" rx="14" fill="url(#audGrad)"
    filter="url(#glow)" stroke="#7ab3d9" stroke-width="1.5"/>
  <rect x="370" y="200" width="160" height="10" rx="14" fill="#7ab3d9" opacity="0.35"/>
  <rect x="370" y="207" width="160" height="3" fill="#7ab3d9" opacity="0.35"/>
  <circle cx="450" cy="230" r="16" fill="rgba(122,179,217,0.2)" stroke="#7ab3d9" stroke-width="1"/>
  <circle cx="450" cy="224" r="5" fill="#a8d4f0"/>
  <path d="M441,242 Q441,234 450,234 Q459,234 459,242" fill="#a8d4f0"/>
  <text x="450" y="265" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="15" font-weight="800" fill="#fff" letter-spacing="3">AUDIENCE</text>
  <text x="450" y="282" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="9" fill="#a8d4f0" opacity="0.85">Who are you designing for?</text>
  <text x="450" y="300" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="9" fill="#a8d4f0" opacity="0.6">Know them deeply.</text>
  <!-- CENTER: GOALS -->
  <rect x="380" y="384" width="140" height="72" rx="12" fill="url(#goalGrad)"
    filter="url(#glow)" stroke="#80c496" stroke-width="1.5"/>
  <rect x="380" y="384" width="140" height="10" rx="12" fill="#80c496" opacity="0.35"/>
  <rect x="380" y="391" width="140" height="3" fill="#80c496" opacity="0.35"/>
  <circle cx="450" cy="410" r="10" fill="none" stroke="#a8e6c0" stroke-width="1.5"/>
  <circle cx="450" cy="410" r="5" fill="none" stroke="#a8e6c0" stroke-width="1.2"/>
  <circle cx="450" cy="410" r="2" fill="#a8e6c0"/>
  <text x="450" y="433" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="15" font-weight="800" fill="#fff" letter-spacing="3">GOALS</text>
  <text x="450" y="448" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="9" fill="#a8e6c0" opacity="0.85">What do you want to achieve?</text>
  <!-- RIGHT PANEL: AUDIENCE DIMENSIONS -->
  <rect x="630" y="120" width="210" height="315" rx="12" fill="#131e30" stroke="#4070a0" stroke-width="1.5"/>
  <rect x="630" y="120" width="210" height="48" rx="12" fill="#2d5a87"/>
  <rect x="630" y="148" width="210" height="20" fill="#2d5a87"/>
  <text x="735" y="150" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="13" font-weight="800" fill="#a8ccf0" letter-spacing="3">AUDIENCE</text>
  <line x1="650" y1="168" x2="820" y2="168" stroke="#4f7cac" stroke-width="0.8" opacity="0.5"/>
  <text x="650" y="196" font-family="Helvetica,Arial,sans-serif" font-size="9" font-weight="600"
    fill="#4f7cac" letter-spacing="2">DIMENSIONS</text>
  <rect x="648" y="205" width="174" height="48" rx="7" fill="#2d5a87" opacity="0.8"/>
  <rect x="648" y="205" width="4" height="48" rx="2" fill="#7ab3d9"/>
  <text x="666" y="224" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#a8ccf0">internal / external</text>
  <text x="666" y="243" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#7ab3d9">stakeholders vs. public audience</text>
  <rect x="648" y="261" width="174" height="48" rx="7" fill="rgba(45,90,135,0.3)"/>
  <rect x="648" y="261" width="4" height="48" rx="2" fill="#4070a0"/>
  <text x="666" y="280" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#c4d9f0">technical / lay</text>
  <text x="666" y="299" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#7ab3d9">expertise level of the reader</text>
  <rect x="648" y="317" width="174" height="48" rx="7" fill="#2d5a87" opacity="0.8"/>
  <rect x="648" y="317" width="4" height="48" rx="2" fill="#7ab3d9"/>
  <text x="666" y="336" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#a8ccf0">familiar / unfamiliar</text>
  <text x="666" y="355" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#7ab3d9">prior context with the topic</text>
  <rect x="658" y="374" width="154" height="44" rx="8" fill="rgba(45,90,135,0.15)"
    stroke="#4070a0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="735" y="391" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="8" fill="#4f7cac" letter-spacing="1">COMBINE DIMENSIONS</text>
  <text x="735" y="409" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="8" fill="#4f7cac" opacity="0.7">to calibrate complexity and depth</text>
  <!-- Footer -->
  <line x1="180" y1="508" x2="720" y2="508" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <text x="450" y="530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#fff" opacity="0.3" letter-spacing="1">Know your audience · Set your goals · Design with intent</text>
</svg>
</body></html>