<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steph Curry — Career 3PT Makes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a18; color: #f0f0f0;
    font-family: 'Roboto Condensed', sans-serif;
    overflow: hidden; height: 100vh; width: 100vw;
  }
  #canvas-container { width: 100%; height: 100%; position: relative; }
  canvas { display: block; }
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,10,24,0.95) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
  }
  #header h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 28px;
    letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, #FFC72C 0%, #FFE08A 50%, #FFC72C 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #header .subtitle {
    font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 14px;
    letter-spacing: 2px; color: #8888aa; text-transform: uppercase;
  }
  #controls {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 10;
  }
  .btn {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px;
    letter-spacing: 2px; text-transform: uppercase;
    border: none; border-radius: 6px; padding: 12px 32px;
    cursor: pointer; transition: all 0.2s ease; pointer-events: auto;
  }
  .btn-shoot {
    background: linear-gradient(135deg, #1D428A, #2856a8); color: #FFC72C;
    box-shadow: 0 4px 20px rgba(29,66,138,0.5);
  }
  .btn-shoot:hover { background: linear-gradient(135deg, #2856a8, #3468c0); transform: translateY(-2px); }
  .btn-reset { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.15); }
  .btn-reset:hover { background: rgba(255,255,255,0.14); color: #ddd; }
  .btn-view { background: rgba(255,199,44,0.12); color: #FFC72C; border: 1px solid rgba(255,199,44,0.25); }
  .btn-view:hover { background: rgba(255,199,44,0.22); }
  #stats {
    position: absolute; top: 80px; right: 24px;
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 1px;
    color: #6666aa; text-align: right; z-index: 10; pointer-events: none;
  }
  #stats .number { font-size: 36px; font-weight: 700; color: #FFC72C; line-height: 1; }
  #stats .label { font-size: 11px; color: #6666aa; letter-spacing: 2px; margin-bottom: 12px; }
  #zone-info {
    position: absolute; bottom: 80px; left: 24px;
    font-family: 'Roboto Condensed', sans-serif; font-size: 12px;
    color: #555577; z-index: 10; pointer-events: none; line-height: 1.6;
  }
</style>
</head>

// ============================================================
// SCENE SETUP
// ============================================================
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1224);
scene.fog = new THREE.FogExp2(0x0c1224, 0.0055);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 200);

// ============================================================
// ORBIT CONTROLS
// ============================================================
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.75, phi: 0.55, radius: 72 };
let target = new THREE.Vector3(0, 4, 22);
let autoRotate = false;

function updateCamera() {
  camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
  camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(target);
}
updateCamera();

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  spherical.theta -= (e.clientX - prevMouse.x) * 0.005;
  spherical.phi = Math.max(0.15, Math.min(1.45, spherical.phi + (e.clientY - prevMouse.y) * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {

const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 16, 12);

function createBallMat(hFrac) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(0.80 + 0.20 * hFrac, 0.35 + 0.35 * hFrac, 0.05 + 0.10 * hFrac),
    roughness: 0.55, metalness: 0.05,
  });
}

// If shots look mirrored (left/right swapped), flip X.
// Set to -1 to mirror, +1 to keep as-is.
const MIRROR_X = -1;

const allBalls = [];
let totalMade = 0, maxStack = 0;
for (const stack of stackData) {
  totalMade += stack.n;
  maxStack = Math.max(maxStack, stack.n);
}

for (const stack of stackData) {
  const stackX = MIRROR_X * stack.x;
  for (let j = 0; j < stack.n; j++) {
    const mesh = new THREE.Mesh(ballGeo, createBallMat(j / Math.max(maxStack, 1)));
    const origY = (j + 0.5) * STACK_STEP;
    mesh.position.set(stackX, origY, stack.z);
    mesh.castShadow = true;
    mesh.userData = {
      origX: stackX, origY: origY, origZ: stack.z,
      stackIndex: j, animating: false, animT: 0,
      animDelay: 0, animDuration: 0, peakH: 0,
      returnStart: null,
    };
    scene.add(mesh);
    allBalls.push(mesh);
  }
}

document.getElementById('total-count').textContent = totalMade.toLocaleString();

// SHOOTING ANIMATION
// ============================================================
const HOOP_TARGET = new THREE.Vector3(0, 3.05, HOOP_Y);
let isAnimating = false;
let animationPhase = 'idle';

function startShooting() {
  if (animationPhase !== 'idle') return;
  isAnimating = true;
  animationPhase = 'shooting';

  const maxDist = allBalls.reduce((mx, b) =>
    Math.max(mx, Math.sqrt(b.userData.origX ** 2 + (b.userData.origZ - HOOP_Y) ** 2)), 0);

  const orderedBalls = [...allBalls].sort((a, b) => {
    const da = Math.sqrt(a.userData.origX ** 2 + (a.userData.origZ - HOOP_Y) ** 2);
    const db = Math.sqrt(b.userData.origX ** 2 + (b.userData.origZ - HOOP_Y) ** 2);
    if (Math.abs(da - db) > 0.001) return db - da; // farthest first
    if (a.userData.stackIndex !== b.userData.stackIndex) return a.userData.stackIndex - b.userData.stackIndex;
    return a.userData.origX - b.userData.origX;
  });

  const baseGap = 0.045; // seconds between each shot

  orderedBalls.forEach((ball, idx) => {
    const d = Math.sqrt(ball.userData.origX ** 2 + (ball.userData.origZ - HOOP_Y) ** 2);
    const distFrac = maxDist > 0 ? d / maxDist : 0;
    ball.userData.animDelay = idx * baseGap + distFrac * 0.08;
    ball.userData.animDuration = 0.8 + d * 0.02;
    ball.userData.animT = 0;
    ball.userData.animating = true;
    ball.userData.peakH = 8 + d * 0.3 + ball.userData.origY * 0.3;
  });
}

function resetBalls() {
  if (animationPhase === 'returning') return;
  isAnimating = true;
  animationPhase = 'returning';

  allBalls.forEach(ball => {
    ball.userData.animT = 0;
    ball.userData.animDelay = Math.random() * 0.8;
    ball.userData.animDuration = 0.6;
    ball.userData.animating = true;
    ball.userData.returnStart = {
      x: ball.position.x, y: ball.position.y, z: ball.position.z,
    };
  });
}

function updateAnimations(dt) {
  if (!isAnimating) return;
  let allDone = true;

  allBalls.forEach(ball => {
    if (!ball.userData.animating) return;
    allDone = false;
    ball.userData.animT += dt;
    const elapsed = ball.userData.animT - ball.userData.animDelay;
    if (elapsed < 0) return;

    const t = Math.min(elapsed / ball.userData.animDuration, 1.0);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    if (animationPhase === 'shooting') {
      const { origX: sx, origY: sy, origZ: sz, peakH } = ball.userData;
      ball.position.x = sx + (HOOP_TARGET.x - sx) * eased;
      ball.position.z = sz + (HOOP_TARGET.z - sz) * eased;
      ball.position.y = sy + (HOOP_TARGET.y - sy) * eased + 4 * peakH * eased * (1 - eased);
      ball.rotation.x += dt * 8;
      ball.rotation.z += dt * 3;
    } else if (animationPhase === 'returning') {
      const rs = ball.userData.returnStart;
      const { origX: ox, origY: oy, origZ: oz } = ball.userData;
      ball.position.x = rs.x + (ox - rs.x) * eased;
      ball.position.y = rs.y + (oy - rs.y) * eased + 2 * eased * (1 - eased);
      ball.position.z = rs.z + (oz - rs.z) * eased;
      ball.rotation.x *= (1 - dt * 3);
      ball.rotation.z *= (1 - dt * 3);
    }

    if (t >= 1.0) {
      ball.userData.animating = false;
      if (animationPhase === 'returning') {
        ball.position.set(ball.userData.origX, ball.userData.origY, ball.userData.origZ);
        ball.rotation.set(0, 0, 0);
      }
    }
  });

  if (allDone) { isAnimating = false; animationPhase = 'idle'; }
}

// ============================================================
// BUTTONS
// ============================================================
document.getElementById('btn-shoot').addEventListener('click', startShooting);
document.getElementById('btn-reset').addEventListener('click', resetBalls);
document.getElementById('btn-view').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('btn-view').textContent = autoRotate ? 'Stop Rotation' : 'Rotate View';
});

// ============================================================
// RENDER LOOP
// ============================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (autoRotate) { spherical.theta += dt * 0.3; updateCamera(); }
  updateAnimations(dt);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script></body></html>
